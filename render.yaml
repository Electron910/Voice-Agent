services:
  - type: web
    name: voiceai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voiceai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: voiceai-redis
          type: redis
          property: connectionString

  - type: redis
    name: voiceai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: voiceai-db
    plan: free