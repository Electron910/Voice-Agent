services:
  - type: web
    name: voiceai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: voiceai-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: voiceai-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: voiceai-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: redis
    name: voiceai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []